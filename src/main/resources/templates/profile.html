<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — OIDC RP Simulator</title>
    <link rel="stylesheet" href="https://unpkg.com/@cdssnc/gcds-components/dist/gcds/gcds.css">
    <script type="module" src="https://unpkg.com/@cdssnc/gcds-components/dist/gcds/gcds.esm.js"></script>
    <script nomodule src="https://unpkg.com/@cdssnc/gcds-components/dist/gcds/gcds.js"></script>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: var(--gcds-spacing-400); }
        th, td { text-align: left; padding: var(--gcds-spacing-200) var(--gcds-spacing-300); border-bottom: 1px solid var(--gcds-color-greyscale-200); }
        th { background: var(--gcds-color-greyscale-50); font-weight: 600; }
        td:first-child { font-family: monospace; color: var(--gcds-color-greyscale-700); width: 30%; }
        td:last-child { word-break: break-all; }
    </style>
</head>
<body>
    <gcds-header lang="en" skip-to-href="#main-content" signature-variant="colour"></gcds-header>

    <gcds-container id="main-content" size="lg" centered tag="main" padding="400">
        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--gcds-spacing-300)">
            <gcds-heading tag="h1">
                Welcome, <span th:text="${name ?: 'User'}">User</span>
            </gcds-heading>
            <form th:action="@{/logout}" method="post">
                <gcds-button type="submit" button-role="danger">Logout</gcds-button>
            </form>
        </div>

        <gcds-heading tag="h2">OIDC Claims</gcds-heading>
        <table>
            <thead>
                <tr><th>Claim</th><th>Value</th></tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${claims}">
                    <td th:text="${entry.key}">claim</td>
                    <td th:text="${entry.value}">value</td>
                </tr>
            </tbody>
        </table>

        <gcds-text margin-top="400"><gcds-link th:href="@{/}">Back to home</gcds-link></gcds-text>
    </gcds-container>

    <gcds-footer lang="en" display="compact"></gcds-footer>
</body>
</html>
