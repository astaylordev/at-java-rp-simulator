<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile — OIDC RP Simulator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #ddd; }
        th { background: #f4f4f4; font-weight: 600; }
        td:first-child { font-family: monospace; color: #555; width: 30%; }
        td:last-child { word-break: break-all; }
        .logout { float: right; padding: 8px 16px; background: #c0392b; color: white;
                  border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .logout:hover { background: #a93226; }
    </style>
</head>
<body>
    <h1>
        Welcome, <span th:text="${name ?: 'User'}">User</span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button class="logout" type="submit">Logout</button>
        </form>
    </h1>

    <h2>OIDC Claims</h2>
    <table>
        <thead>
            <tr><th>Claim</th><th>Value</th></tr>
        </thead>
        <tbody>
            <tr th:each="entry : ${claims}">
                <td th:text="${entry.key}">claim</td>
                <td th:text="${entry.value}">value</td>
            </tr>
        </tbody>
    </table>

    <p style="margin-top:20px"><a th:href="@{/}">Back to home</a></p>
</body>
</html>
